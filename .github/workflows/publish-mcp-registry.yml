# Publish this server to the official MCP Registry (registry.modelcontextprotocol.io)
# from server.json, using GitHub OIDC to prove ownership of the io.github.nqzai
# namespace — no secrets. The npm package @kakunin/mcp is published separately;
# this only registers/updates the server listing.
name: Publish to MCP Registry

# Manual re-publish only. The tag-triggered path lives in publish.yml, which
# publishes npm first (the registry validates the published package), then the
# registry — avoiding a race between two workflows on the same tag.
on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC auth to the registry
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to the MCP Registry
        run: ./mcp-publisher publish
